<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Atur Ulang Password - USAHA BUDIDAYA MELON SUKSES 7 TURUNAN</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          boxShadow: {
            card: '0 4px 24px -2px rgba(15, 23, 42, 0.08), 0 2px 8px -2px rgba(15, 23, 42, 0.05)',
            'card-lg': '0 16px 40px -12px rgba(15, 23, 42, 0.18), 0 4px 16px -4px rgba(15, 23, 42, 0.08)',
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="assets/css/style.css">
  <style type="text/tailwindcss">
    @layer components {
      .input-field { @apply w-full border border-emerald-100 bg-emerald-50/50 rounded-xl px-4 py-2.5 text-sm text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition; }
      .label { @apply block text-sm text-emerald-800/80 mb-1 font-medium; }
      .btn-primary { @apply w-full inline-flex items-center justify-center gap-1.5 bg-gradient-to-r from-lime-400 via-emerald-400 to-emerald-500 text-white py-2.5 px-4 rounded-xl font-semibold shadow-md shadow-emerald-500/25 hover:shadow-lg hover:shadow-emerald-500/35 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 disabled:opacity-60 disabled:cursor-not-allowed disabled:hover:translate-y-0 disabled:hover:shadow-md; }
      .btn-link { @apply text-sm font-medium text-emerald-600 hover:text-emerald-700 hover:underline transition; }
    }
  </style>
</head>
<body class="min-h-screen relative overflow-hidden bg-gradient-to-br from-amber-50 via-lime-50 to-emerald-50 flex items-center justify-center p-4">

  <!-- Dekorasi blur pastel -->
  <div class="absolute -top-24 -left-24 w-72 h-72 bg-lime-200/50 rounded-full blur-3xl" aria-hidden="true"></div>
  <div class="absolute -bottom-24 -right-16 w-72 h-72 bg-amber-200/50 rounded-full blur-3xl" aria-hidden="true"></div>
  <div class="absolute top-1/3 -right-10 w-48 h-48 bg-emerald-200/40 rounded-full blur-3xl" aria-hidden="true"></div>

  <div class="relative z-10 w-full max-w-sm bg-white/90 backdrop-blur rounded-3xl shadow-card-lg border border-emerald-100 p-6 sm:p-8 fade-in">

    <div class="text-center">
      <div class="text-4xl">🍈</div>
      <h1 class="text-2xl font-extrabold text-emerald-800 mt-2">Atur Password Baru</h1>
      <p class="text-sm text-emerald-700/70 mt-1">Masukkan password baru untuk akun Anda.</p>
    </div>

    <form id="form-reset" class="mt-6 space-y-4 fade-in fade-in-1">
      <div>
        <label class="label" for="password">Password Baru</label>
        <input type="password" id="password" name="password" required minlength="6" autocomplete="new-password" placeholder="Minimal 6 karakter" class="input-field">
      </div>
      <div>
        <label class="label" for="password_confirm">Konfirmasi Password Baru</label>
        <input type="password" id="password_confirm" name="password_confirm" required minlength="6" autocomplete="new-password" placeholder="Ulangi password baru" class="input-field">
      </div>
      <p id="reset-error" class="hidden text-sm text-rose-600 font-medium text-center"></p>
      <button type="submit" id="reset-submit" class="btn-primary">Simpan Password Baru</button>
    </form>

    <div id="reset-success" class="hidden mt-6 text-center space-y-2 fade-in">
      <div class="text-4xl">✅</div>
      <p class="text-sm text-emerald-700">Password berhasil diubah. Silakan login dengan password baru Anda.</p>
    </div>

    <p class="text-center mt-6">
      <a href="login.html" class="btn-link">&larr; Kembali ke Login</a>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="assets/js/reset-password.js"></script>
</body>
</html>
