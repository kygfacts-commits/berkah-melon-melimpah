<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Masuk - Pencatatan Budidaya Melon</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          boxShadow: {
            card: '0 4px 24px -2px rgba(15, 23, 42, 0.08), 0 2px 8px -2px rgba(15, 23, 42, 0.05)',
            'card-lg': '0 16px 40px -12px rgba(15, 23, 42, 0.18), 0 4px 16px -4px rgba(15, 23, 42, 0.08)',
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="assets/css/style.css">
  <style type="text/tailwindcss">
    @layer components {
      .input-field { @apply w-full border border-emerald-100 bg-emerald-50/50 rounded-xl px-4 py-2.5 text-sm text-slate-700 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-emerald-400 focus:border-transparent transition; }
      .label { @apply block text-sm text-emerald-800/80 mb-1 font-medium; }
      .btn-primary { @apply w-full inline-flex items-center justify-center gap-1.5 bg-gradient-to-r from-lime-400 via-emerald-400 to-emerald-500 text-white py-2.5 px-4 rounded-xl font-semibold shadow-md shadow-emerald-500/25 hover:shadow-lg hover:shadow-emerald-500/35 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200 disabled:opacity-60 disabled:cursor-not-allowed disabled:hover:translate-y-0 disabled:hover:shadow-md; }
      .btn-link { @apply text-sm font-medium text-emerald-600 hover:text-emerald-700 hover:underline transition; }
    }
  </style>
</head>
<body class="min-h-screen relative overflow-hidden bg-gradient-to-br from-amber-50 via-lime-50 to-emerald-50 flex items-center justify-center p-4">

  <!-- Dekorasi blur pastel -->
  <div class="absolute -top-24 -left-24 w-72 h-72 bg-lime-200/50 rounded-full blur-3xl" aria-hidden="true"></div>
  <div class="absolute -bottom-24 -right-16 w-72 h-72 bg-amber-200/50 rounded-full blur-3xl" aria-hidden="true"></div>
  <div class="absolute top-1/3 -right-10 w-48 h-48 bg-emerald-200/40 rounded-full blur-3xl" aria-hidden="true"></div>

  <div class="relative z-10 w-full max-w-sm bg-white/90 backdrop-blur rounded-3xl shadow-card-lg border border-emerald-100 p-6 sm:p-8 fade-in">

    <!-- Ilustrasi Melon -->
    <svg viewBox="0 0 200 180" class="w-28 h-28 sm:w-32 sm:h-32 mx-auto fade-in" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
      <defs>
        <clipPath id="melon-body">
          <circle cx="100" cy="95" r="78"/>
        </clipPath>
      </defs>

      <ellipse cx="100" cy="172" rx="58" ry="8" fill="#DCEFC7"/>

      <circle cx="100" cy="95" r="78" fill="#C8E6A0"/>

      <g clip-path="url(#melon-body)" stroke="#A3CC78" stroke-width="2.5" fill="none" opacity="0.8">
        <path d="M5 60 Q100 20 195 60"/>
        <path d="M2 95 Q100 55 198 95"/>
        <path d="M5 130 Q100 95 195 130"/>
        <path d="M35 15 Q75 95 35 178"/>
        <path d="M80 8 Q105 95 88 185"/>
        <path d="M130 8 Q115 95 135 185"/>
        <path d="M168 15 Q128 95 168 178"/>
      </g>

      <path d="M100 95 L164 50 A78 78 0 0 1 164 140 Z" fill="#EAF3C9" stroke="#C8E6A0" stroke-width="3" stroke-linejoin="round"/>
      <path d="M100 95 L153 58 A65 65 0 0 1 153 132 Z" fill="#FFF6C2"/>

      <ellipse cx="118" cy="78" rx="5" ry="9" fill="#FCD34D" stroke="#F4B400" stroke-width="1" transform="rotate(35 118 78)"/>
      <ellipse cx="132" cy="95" rx="5" ry="9" fill="#FCD34D" stroke="#F4B400" stroke-width="1" transform="rotate(8 132 95)"/>
      <ellipse cx="118" cy="112" rx="5" ry="9" fill="#FCD34D" stroke="#F4B400" stroke-width="1" transform="rotate(-35 118 112)"/>
      <ellipse cx="140" cy="80" rx="4" ry="7" fill="#FDE68A" stroke="#F4B400" stroke-width="1" transform="rotate(25 140 80)"/>
      <ellipse cx="140" cy="110" rx="4" ry="7" fill="#FDE68A" stroke="#F4B400" stroke-width="1" transform="rotate(-25 140 110)"/>

      <rect x="96" y="6" width="8" height="16" rx="3" fill="#B08968"/>
      <path d="M100 12 C116 -2 138 4 140 20 C122 24 106 22 100 12 Z" fill="#8BC34A"/>

      <ellipse cx="62" cy="58" rx="20" ry="11" fill="#FFFFFF" opacity="0.35" transform="rotate(-25 62 58)"/>
    </svg>

    <div class="text-center mt-3 fade-in fade-in-1">
      <h1 class="text-2xl font-extrabold text-emerald-800">Selamat Datang 🍈</h1>
      <p class="text-sm text-emerald-700/70 mt-1">Masuk untuk mengelola budidaya melon Anda</p>
    </div>

    <!-- PANEL LOGIN -->
    <div id="login-panel" class="mt-6 space-y-4">
      <form id="form-login" class="space-y-4 fade-in fade-in-2">
        <div>
          <label class="label" for="email">Email</label>
          <input type="email" id="email" name="email" required autocomplete="username" placeholder="nama@email.com" class="input-field">
        </div>
        <div>
          <label class="label" for="password">Password</label>
          <div class="relative">
            <input type="password" id="password" name="password" required autocomplete="current-password" placeholder="••••••••" class="input-field pr-11">
            <button type="button" id="toggle-password" class="absolute inset-y-0 right-0 flex items-center px-3 text-emerald-600/70 hover:text-emerald-700" aria-label="Tampilkan password" tabindex="-1">👁️</button>
          </div>
        </div>
        <p id="login-error" class="hidden text-sm text-rose-600 font-medium text-center"></p>
        <button type="submit" id="login-submit" class="btn-primary">Masuk</button>
      </form>

      <div class="text-center fade-in fade-in-3">
        <button type="button" id="forgot-toggle" class="btn-link">Lupa Password?</button>
      </div>
    </div>

    <!-- PANEL LUPA PASSWORD -->
    <div id="forgot-panel" class="hidden mt-6 space-y-4">
      <div class="text-center space-y-1">
        <h2 class="font-bold text-emerald-800">Lupa Password?</h2>
        <p class="text-sm text-emerald-700/70">Masukkan email Anda, kami akan mengirimkan link untuk mengatur ulang password.</p>
      </div>
      <form id="form-forgot" class="space-y-4">
        <div>
          <label class="label" for="forgot-email">Email</label>
          <input type="email" id="forgot-email" name="email" required autocomplete="username" placeholder="nama@email.com" class="input-field">
        </div>
        <p id="forgot-message" class="hidden text-sm text-emerald-700 bg-emerald-50 border border-emerald-100 rounded-xl px-3 py-2 text-center"></p>
        <button type="submit" id="forgot-submit" class="btn-primary">Kirim Link Reset</button>
      </form>
      <div class="text-center">
        <button type="button" id="back-to-login" class="btn-link">&larr; Kembali ke Login</button>
      </div>
    </div>

    <p class="text-center text-xs text-emerald-700/60 mt-6 pt-4 border-t border-emerald-100 fade-in fade-in-3">
      Belum punya akun? Hubungi admin untuk mendapatkan akses.
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="assets/js/login.js"></script>
</body>
</html>
