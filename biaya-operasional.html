<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Biaya Operasional - Pencatatan Budidaya Melon</title>
  <script>
    (function () {
      var theme = localStorage.getItem('melon-theme');
      if (theme === 'dark' || (!theme && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.add('dark');
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'] },
          boxShadow: {
            card: '0 4px 24px -2px rgba(15, 23, 42, 0.08), 0 2px 8px -2px rgba(15, 23, 42, 0.05)',
            'card-lg': '0 16px 40px -12px rgba(15, 23, 42, 0.18), 0 4px 16px -4px rgba(15, 23, 42, 0.08)',
          },
        },
      },
    };
  </script>
  <link rel="stylesheet" href="assets/css/style.css">
  <style type="text/tailwindcss">
    @layer components {
      .page-shell { @apply max-w-3xl mx-auto min-h-screen flex flex-col; }
      .card { @apply bg-white dark:bg-slate-800 rounded-2xl shadow-card border border-slate-100 dark:border-slate-700 transition-colors duration-300; }
      .btn-primary { @apply inline-flex items-center justify-center gap-1.5 bg-gradient-to-r from-emerald-600 to-green-500 text-white py-2.5 px-4 rounded-xl font-semibold shadow-md shadow-emerald-600/20 hover:shadow-lg hover:shadow-emerald-600/30 hover:-translate-y-0.5 active:translate-y-0 transition-all duration-200; }
      .btn-secondary { @apply inline-flex items-center justify-center gap-1.5 bg-white dark:bg-slate-700 border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-200 py-2.5 px-4 rounded-xl font-medium hover:bg-slate-50 dark:hover:bg-slate-600 transition; }
      .input-field { @apply w-full border border-slate-300 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-100 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500 transition; }
      .label { @apply block text-sm text-slate-600 dark:text-slate-300 mb-1 font-medium; }
      .text-muted { @apply text-slate-500 dark:text-slate-400; }
      .text-heading { @apply text-slate-800 dark:text-slate-100; }
      .skeleton { @apply animate-pulse bg-slate-200 dark:bg-slate-700 rounded-lg; }
    }
  </style>
</head>
<body class="bg-gradient-to-b from-emerald-50 via-slate-50 to-slate-100 dark:from-slate-900 dark:via-slate-900 dark:to-slate-950 text-slate-800 dark:text-slate-100 min-h-screen transition-colors duration-300">
  <div class="page-shell">

    <div class="sticky top-0 z-20 shadow-md">
      <header class="bg-gradient-to-r from-emerald-600 to-green-500 text-white px-4 py-3">
        <div class="flex items-center gap-3">
          <a href="index.html" class="shrink-0 text-white/90 hover:text-white text-xl leading-none" aria-label="Kembali ke menu utama">&larr;</a>
          <div class="min-w-0 flex-1">
            <h1 id="greenhouse-name" class="text-lg sm:text-xl font-bold truncate">🍈 Memuat...</h1>
            <p class="text-emerald-50 text-xs sm:text-sm mt-0.5">Biaya Operasional</p>
          </div>
          <button data-theme-toggle type="button" class="shrink-0 w-9 h-9 rounded-full bg-white/15 hover:bg-white/25 flex items-center justify-center text-base transition" aria-label="Ganti tema">🌙</button>
        </div>
      </header>
      <div class="flex flex-wrap items-end gap-2 bg-white dark:bg-slate-800 border-b border-slate-200 dark:border-slate-700 px-3 py-2 transition-colors">
        <div>
          <label class="block text-[11px] text-muted mb-0.5">Dari Tanggal</label>
          <input type="date" id="filter-dari" class="border border-slate-300 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-100 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
        <div>
          <label class="block text-[11px] text-muted mb-0.5">Sampai Tanggal</label>
          <input type="date" id="filter-sampai" class="border border-slate-300 dark:border-slate-600 dark:bg-slate-900 dark:text-slate-100 rounded-lg px-2 py-1.5 text-sm focus:outline-none focus:ring-2 focus:ring-emerald-500">
        </div>
        <button id="filter-apply" type="button" class="px-3 py-1.5 bg-emerald-600 text-white rounded-lg text-sm font-medium hover:bg-emerald-700">Terapkan</button>
        <button id="filter-reset" type="button" class="px-3 py-1.5 border border-slate-300 dark:border-slate-600 text-slate-600 dark:text-slate-300 rounded-lg text-sm font-medium hover:bg-slate-50 dark:hover:bg-slate-700">Reset</button>
      </div>
    </div>

    <main class="flex-1 p-4 space-y-4 pb-24 sm:pb-10">

      <div id="month-summary" class="fade-in">
        <div class="skeleton h-32"></div>
      </div>

      <form id="form-biaya-operasional" class="card p-4 space-y-3 fade-in fade-in-1">
        <h2 class="font-semibold text-heading">Tambah Biaya Operasional</h2>
        <div>
          <label class="label">Tanggal</label>
          <input type="date" name="tanggal" required class="input-field">
        </div>
        <div>
          <label class="label">Jenis Biaya</label>
          <select name="jenis_biaya" required class="input-field">
            <option value="listrik">Listrik</option>
            <option value="air">Air</option>
            <option value="tenaga_kerja">Tenaga Kerja</option>
            <option value="lainnya">Lainnya</option>
          </select>
        </div>
        <div>
          <label class="label">Nominal (Rp)</label>
          <input type="number" name="nominal" min="0" step="100" required placeholder="0" class="input-field">
        </div>
        <div>
          <label class="label">Keterangan</label>
          <textarea name="keterangan" rows="2" placeholder="Catatan tambahan (opsional)" class="input-field"></textarea>
        </div>
        <div class="flex gap-2">
          <button type="submit" id="biaya-submit-btn" class="flex-1 btn-primary">Simpan</button>
          <button type="button" id="biaya-cancel-btn" class="hidden btn-secondary">Batal</button>
        </div>
      </form>

      <div class="card p-4 flex flex-wrap justify-between items-center gap-2 fade-in fade-in-2">
        <span class="text-sm text-muted">Total Biaya Operasional</span>
        <span id="biaya-operasional-total" class="font-bold text-rose-600 dark:text-rose-400">Rp 0</span>
        <button id="biaya-operasional-export" type="button" class="w-full sm:w-auto text-xs px-3 py-1.5 bg-white dark:bg-slate-700 border border-emerald-200 dark:border-emerald-700 text-emerald-700 dark:text-emerald-400 rounded-md font-medium hover:bg-emerald-50 dark:hover:bg-slate-600">Export Excel</button>
      </div>

      <div id="biaya-operasional-list" class="space-y-2 fade-in fade-in-3">
        <div class="skeleton h-20"></div>
        <div class="skeleton h-20"></div>
        <div class="skeleton h-20"></div>
      </div>

    </main>

    <footer class="text-center text-xs text-muted py-3">
      Data tersimpan otomatis ke Supabase
    </footer>
  </div>

  <div id="bottom-nav-root"></div>

  <div id="toast" class="hidden fixed bottom-4 left-1/2 -translate-x-1/2 px-4 py-2 rounded-lg shadow-lg text-sm text-white z-50"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <script type="module" src="assets/js/theme.js"></script>
  <script type="module" src="assets/js/filter.js"></script>
  <script type="module" src="assets/js/biaya-operasional.js"></script>
</body>
</html>
